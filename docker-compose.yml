services:
  db:
    build:
      context: ./docker
      dockerfile: Dockerfile
    image: vacation_rental_postgis_pgvector:16
    container_name: vacation_rental_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vacation_rental_db
      POSTGRES_USER: vacation_user
      POSTGRES_PASSWORD: vacation_pass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacation_user -d vacation_rental_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
